name: Altimate Code Review
on:
  pull_request:
    paths: ['**.sql', '**.yml', 'models/**', 'macros/**']
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/altimate'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-core dbt-bigquery

      - name: Write BigQuery keyfile
        env:
          BQ_CREDS: ${{ secrets.BIGQUERY_CREDENTIALS }}
        run: printenv BQ_CREDS > /tmp/bq-keyfile.json

      - name: Install dbt packages
        run: dbt deps --profiles-dir .
        env:
          BIGQUERY_KEYFILE_PATH: /tmp/bq-keyfile.json

      - name: Compile dbt project
        run: dbt compile --profiles-dir . --target ci
        env:
          BIGQUERY_KEYFILE_PATH: /tmp/bq-keyfile.json

      - uses: AltimateAI/altimate-code-actions@v0
        with:
          mode: static
          comment_mode: both
          severity_threshold: info
          impact_analysis: 'true'
          manifest_path: target/manifest.json

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/bq-keyfile.json
