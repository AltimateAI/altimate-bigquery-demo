version: 2

sources:
  - name: thelook_ecommerce
    database: bigquery-public-data
    schema: thelook_ecommerce
    description: >
      TheLook is a fictitious eCommerce clothing site developed by the Looker team.
      This public dataset contains order, product, user, and web event data.
    tables:
      - name: orders
        description: Customer orders with status tracking and timestamps.
        columns:
          - name: order_id
            description: Unique identifier for each order. user_id
            description: Foreign key to the users table. status
            description: "Current order status: Shipped, Complete, Returned, Cancelled, Processing."
          - name: created_at
            description: Timestamp when the order was placed.

      - name: order_items
        description: Individual line items within each order, linking orders to products.
        columns:
          - name: id
            description: Unique identifier for each order item. order_id
            description: Foreign key to the orders table. product_id
            description: Foreign key to the products table. sale_price
            description: Price at which the item was sold.

      - name: users
        description: Customer profiles including demographics and location.
        columns:
          - name: id
            description: Unique identifier for each user. email
            description: Customer email address.
          - name: first_name
            description: Customer first name.
          - name: last_name
            description: Customer last name.

      - name: products
        description: Product catalog with pricing, brand, and category information.
        columns:
          - name: id
            description: Unique identifier for each product. name
            description: Product name.
          - name: category
            description: Product category.
          - name: brand
            description: Product brand.
          - name: retail_price
            description: Retail price of the product.

      - name: events
        description: Web session events tracking user browsing behavior.
        columns:
          - name: id
            description: Unique identifier for each event. user_id
            description: Foreign key to the users table.
          - name: session_id
            description: Session identifier grouping related events.
          - name: event_type
            description: "Type of event: home, product, cart, purchase, etc."
